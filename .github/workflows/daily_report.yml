name: Windows KB – Täglicher Release Report

on:
  # ── Täglich zur gewünschten Uhrzeit (immer UTC!) ─────────────────────────
  # 06:00 UTC = 07:00 MEZ (Winter) / 08:00 MESZ (Sommer)
  # Weitere Beispiele:
  #   '0 5 * * *'     → 06:00 MEZ
  #   '30 5 * * 1-5'  → Mo–Fr 06:30 MEZ (kein Wochenende)
  schedule:
    - cron: '0 6 * * *'

  # ── Manuell auslösen (z.B. zum Testen) ──────────────────────────────────
  workflow_dispatch:
    inputs:
      force_send:
        description: 'E-Mail auch senden wenn KB unverändert'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  generate-and-send-report:
    name: KB Report generieren & versenden
    runs-on: ubuntu-latest

    # Berechtigung für GitHub Models API (GITHUB_TOKEN) und Repo-Push
    permissions:
      contents: write
      models: read              # Zugriff auf GitHub Models / Copilot API

    steps:
      # ── 1. Repository auschecken ─────────────────────────────────────────
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python einrichten ──────────────────────────────────────────────
      - name: Python 3.12 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # ── 3. Abhängigkeiten installieren ───────────────────────────────────
      - name: Python-Abhängigkeiten installieren
        run: pip install -r requirements.txt

      # ── 4. Report generieren und per Mail senden ─────────────────────────
      - name: Report generieren & E-Mail senden
        env:
          # GitHub Copilot / Models API – automatisch verfügbar, kein Secret nötig!
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # SMTP-Konfiguration aus Repository-Secrets
          SMTP_SERVER:  ${{ secrets.SMTP_SERVER }}
          SMTP_PORT:    ${{ secrets.SMTP_PORT }}
          SMTP_USER:    ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO:     ${{ secrets.EMAIL_TO }}
          EMAIL_FROM:   ${{ secrets.EMAIL_FROM }}
          # Manueller Auslöser: force_send-Eingabe übernehmen
          FORCE_SEND:   ${{ github.event.inputs.force_send || 'false' }}
        run: python generate_report.py

      # ── 5. Letzte KB-Nummer zurück ins Repository committen ──────────────
      - name: Letzte KB-Nummer speichern
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_processed_kb.txt
          git diff --staged --quiet || git commit -m "chore: letzte KB aktualisiert [skip ci]"
          git push

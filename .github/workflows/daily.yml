name: Daily Summary

on:
  workflow_dispatch:
  # Run this workflow daily at 5:30pm UTC
  schedule:
    - cron: '30 17 * * *'

permissions:
  contents: read

env:
  GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

jobs:
  daily-summary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Run Copilot CLI
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          COPILOT_RESPONSE=$(copilot -p "Du bist ein Spezialist im Releasemanagement und sollst eine Webseite von Microsoft analysieren, welche neuen Releasenotes ein neuer Patch besitzt. Dabei sollen die Abschnitte Schrittweiser Rollout und Normaler Rollout durch gegangen werden. Die Releasenotes sollst du in eine CSV speichern. Dabei sollst du die Spalten Einsatz (Monat), Einsatz, Rollout, KB-Nummer, Betriebssystembuild, Titel, Beschreibung befüllen. Analysiere folgende Webseite https://support.microsoft.com/de-de/topic/26-m%C3%A4rz-2026-kb5079391-betriebssystembuilds-26200-8116-und-26100-8116-vorschau-7c9e2275-b9ba-4068-aeb0-23da42b81d3b Gib die Ausgabe ausschliesslich als CSV-Inhalt zurueck, ohne zusaetzliche Erklaerungen.")
          echo "COPILOT_RESPONSE<<EOF" >> $GITHUB_ENV
          echo "$COPILOT_RESPONSE" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "$COPILOT_RESPONSE" > releasenotes.csv

      - name: Send Email
        run: node .github/scripts/send-email.mjs

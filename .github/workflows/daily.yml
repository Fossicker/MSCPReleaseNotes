name: Daily Summary

on:
  workflow_dispatch:
  # Run this workflow daily at 5:30pm UTC
  schedule:
    - cron: '30 17 * * *'

permissions:
  contents: read

env:
  GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

jobs:
  daily-summary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Fetch Microsoft Release Notes
        run: |
          curl -s -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            -H "Accept-Language: de-DE,de;q=0.9" \
            -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
            --max-time 30 \
            "https://support.microsoft.com/de-de/topic/26-m%C3%A4rz-2026-kb5079391-betriebssystembuilds-26200-8116-und-26100-8116-vorschau-7c9e2275-b9ba-4068-aeb0-23da42b81d3b" \
            > page_raw.html
          sed 's/<[^>]*>//g' page_raw.html | sed '/^[[:space:]]*$/d' > page_content.txt
          echo "Page content fetched ($(wc -l < page_content.txt) lines)"

      - name: Run Copilot CLI
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          PAGE_CONTENT: ${{ env.PAGE_CONTENT }}
        run: |
          export PAGE_CONTENT=$(cat page_content.txt)
          COPILOT_RESPONSE=$(copilot --model claude-sonnet-4.6 -p "Du bist ein Spezialist im Releasemanagement und sollst folgenden Webseiteninhalt von Microsoft analysieren, welche neuen Releasenotes ein neuer Patch besitzt. Dabei sollen die Abschnitte Schrittweiser Rollout und Normaler Rollout durch gegangen werden. Die Releasenotes sollst du in eine CSV speichern. Dabei sollst du die Spalten Einsatz (Monat), Einsatz, Rollout, KB-Nummer, Betriebssystembuild, Titel, Beschreibung befuellen. Gib die Ausgabe ausschliesslich als CSV-Inhalt zurueck, ohne zusaetzliche Erklaerungen. Webseiteninhalt: $PAGE_CONTENT")
          echo "COPILOT_RESPONSE<<EOF" >> $GITHUB_ENV
          echo "$COPILOT_RESPONSE" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "$COPILOT_RESPONSE" > releasenotes.csv

      - name: Send Email
        run: node .github/scripts/send-email.mjs
